<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌻 ห้อง ป.1/8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Sarabun:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFC93C; --sun-2:#FFB347; --sky:#8FD3F4; --sky-2:#C7ECFF;
    --ink:#3A2E14; --ink-soft:#7A6B45;
    --shadow:0 8px 0 rgba(58,46,20,.10), 0 14px 30px rgba(58,46,20,.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun',sans-serif; color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, #FFF4D6 0%, var(--sky-2) 60%, var(--sky) 100%);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:560px; padding:26px 18px 40px; flex:1; display:flex; flex-direction:column;}

  .hero{
    background:#fff; border-radius:28px; padding:26px 22px; box-shadow:var(--shadow);
    text-align:center; margin-bottom:20px; position:relative; overflow:hidden;
    border:4px solid #FFE9A8;
  }
  .hero .sun{font-size:3rem; line-height:1;}
  .hero h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.7rem; margin:8px 0 2px;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}

  .menu{display:flex; flex-direction:column; gap:16px;}
  .card{
    border:0; cursor:pointer; text-align:left; color:#fff; border-radius:24px;
    padding:22px 20px; display:flex; align-items:center; gap:18px; box-shadow:var(--shadow);
    text-decoration:none; transition:transform .12s;
  }
  .card:active{transform:translateY(4px);}
  .card .ic{font-size:2.6rem; background:rgba(255,255,255,.25); width:70px; height:70px; border-radius:20px; display:grid; place-items:center; flex:none;}
  .card .t{font-family:'Fredoka',sans-serif; font-size:1.5rem; font-weight:700; line-height:1.1;}
  .card .d{font-weight:700; opacity:.95; font-size:.95rem;}
  .c-reg{background:linear-gradient(135deg,var(--sun-2),var(--sun));}
  .c-prac{background:linear-gradient(135deg,#5BC8F0,#3FA9F5);}
  .c-sched{background:linear-gradient(135deg,#5BD9B2,#41C9A0);}

  .foot{margin-top:auto; padding-top:24px; text-align:center; color:var(--ink-soft); font-weight:700; font-size:.85rem; opacity:.85;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="sun">🌻</div>
    <h1>ห้อง ป.1/8</h1>
  </div>

  <div class="menu">
    <a class="card c-reg" href="registry.html">
      <span class="ic">📋</span>
      <span>
        <span class="t">ทะเบียนนักเรียน</span><br>
        <span class="d">ข้อมูลนักเรียน · ผู้ปกครอง · คุณครู</span>
      </span>
    </a>
    <a class="card c-prac" href="practice/index.html">
      <span class="ic">🎮</span>
      <span>
        <span class="t">ติวเด็ก</span><br>
        <span class="d">เกม &amp; แบบทดสอบฝึกทักษะ</span>
      </span>
    </a>
    <a class="card c-sched" href="schedule.html">
      <span class="ic">🗓️</span>
      <span>
        <span class="t">ตารางเรียน</span><br>
        <span class="d">ตารางสอน ป.1/8 · ภาคเรียน 1/2569</span>
      </span>
    </a>
  </div>

  <div class="foot">🌻 Classroom P.1/8 · ทำด้วยใจเพื่อเด็กๆ</div>
</div>
</body>
</html>
