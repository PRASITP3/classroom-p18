<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌻 ห้อง ป.1/8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Sarabun:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFC93C; --sun-2:#FFB347; --sky:#8FD3F4; --sky-2:#C7ECFF;
    --ink:#3A2E14; --ink-soft:#7A6B45;
    --shadow:0 8px 0 rgba(58,46,20,.10), 0 16px 34px rgba(58,46,20,.16);
    --shadow-hi:0 12px 0 rgba(58,46,20,.10), 0 22px 44px rgba(58,46,20,.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun',sans-serif; color:var(--ink);
    background:radial-gradient(130% 130% at 50% -10%, #FFF6DC 0%, var(--sky-2) 55%, var(--sky) 100%);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    position:relative; overflow-x:hidden;
  }
  /* ปุยเมฆ/บลอบตกแต่งพื้นหลัง (ฟุ้งเบาๆ ให้มีมิติ) */
  .blob{position:fixed; border-radius:50%; filter:blur(46px); opacity:.55; z-index:0; pointer-events:none;}
  .b1{width:320px; height:320px; background:#FFE08A; top:-90px; left:-100px;}
  .b2{width:300px; height:300px; background:#9FE3FF; top:12%; right:-110px;}
  .b3{width:280px; height:280px; background:#A8F0D2; bottom:-90px; left:-70px; opacity:.5;}

  .wrap{width:100%; max-width:560px; padding:34px 18px 30px; flex:1; display:flex; flex-direction:column; position:relative; z-index:1;}

  .hero{
    background:linear-gradient(180deg,#fff,#FFFDF6); border-radius:30px; padding:28px 22px 24px; box-shadow:var(--shadow);
    text-align:center; margin-bottom:26px; position:relative; overflow:hidden; border:4px solid #FFE9A8;
    animation:rise .5s ease both;
  }
  .hero::before{content:""; position:absolute; inset:0 0 auto 0; height:8px; background:linear-gradient(90deg,#FFD23F,#FF9F1C,#FFD23F);}
  .hero .sun{font-size:3.2rem; line-height:1; display:inline-block; animation:sway 3.5s ease-in-out infinite;}
  .hero h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.85rem; margin:8px 0 4px;}
  .hero .greet{margin:0; color:var(--ink-soft); font-weight:700; font-size:.95rem;}
  .hero .term{display:inline-block; margin-top:12px; background:#FFF3CD; color:#B8860B; border:2px solid #FFE29A;
    border-radius:999px; padding:4px 14px; font-family:'Fredoka'; font-weight:600; font-size:.8rem;}

  .menu{display:flex; flex-direction:column; gap:16px;}
  .card{
    border:0; cursor:pointer; text-align:left; color:#fff; border-radius:24px;
    padding:20px 18px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow);
    text-decoration:none; position:relative; overflow:hidden; transition:transform .16s, box-shadow .16s;
    animation:rise .5s ease both;
  }
  .card::after{content:"›"; margin-left:auto; font-family:'Fredoka'; font-size:2rem; font-weight:600; opacity:.7; padding-left:6px; transition:transform .16s;}
  .card::before{content:""; position:absolute; inset:0; background:radial-gradient(120% 80% at 100% 0%, rgba(255,255,255,.28), transparent 60%); pointer-events:none;}
  .card:hover{transform:translateY(-3px); box-shadow:var(--shadow-hi);}
  .card:hover::after{transform:translateX(4px);}
  .card:active{transform:translateY(3px); box-shadow:var(--shadow);}
  .card .ic{font-size:2.4rem; background:rgba(255,255,255,.28); width:66px; height:66px; border-radius:20px; display:grid; place-items:center; flex:none; box-shadow:inset 0 2px 6px rgba(255,255,255,.35), 0 4px 10px rgba(0,0,0,.08);}
  .card .t{font-family:'Fredoka',sans-serif; font-size:1.45rem; font-weight:700; line-height:1.12;}
  .card .d{font-weight:700; opacity:.95; font-size:.92rem;}
  .c-reg{background:linear-gradient(135deg,var(--sun-2),var(--sun));}
  .c-prac{background:linear-gradient(135deg,#5BC8F0,#3FA9F5);}
  .c-sched{background:linear-gradient(135deg,#5BD9B2,#41C9A0);}
  .card.c-reg{animation-delay:.06s;}
  .card.c-prac{animation-delay:.14s;}
  .card.c-sched{animation-delay:.22s;}

  .foot{margin-top:auto; padding-top:26px; text-align:center; color:var(--ink-soft); font-weight:700; font-size:.82rem; opacity:.8;}

  @keyframes rise{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);}}
  @keyframes sway{0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);}}
  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} }
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div class="wrap">
  <div class="hero">
    <div class="sun">🌻</div>
    <h1>ห้อง ป.1/8</h1>
    <p class="greet">ยินดีต้อนรับ · เลือกเมนูด้านล่างได้เลย 👇</p>
    <span class="term">ภาคเรียนที่ 1/2569 · โรงเรียนวิเชียรชม</span>
  </div>

  <div class="menu">
    <a class="card c-reg" href="registry.html">
      <span class="ic">📋</span>
      <span>
        <span class="t">ทะเบียนนักเรียน</span><br>
        <span class="d">ข้อมูลนักเรียน · ผู้ปกครอง · คุณครู</span>
      </span>
    </a>
    <a class="card c-prac" href="practice/index.html">
      <span class="ic">🎮</span>
      <span>
        <span class="t">ติวเด็ก</span><br>
        <span class="d">แบบทดสอบฝึกทักษะ</span>
      </span>
    </a>
    <a class="card c-sched" href="schedule.html">
      <span class="ic">🗓️</span>
      <span>
        <span class="t">ตารางเรียน</span><br>
        <span class="d">ตารางสอน ป.1/8 · ภาคเรียน 1/2569</span>
      </span>
    </a>
  </div>

  <div class="foot">🌤️ ห้องเรียน ป.1/8 · โรงเรียนวิเชียรชม</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</body>
</html>
