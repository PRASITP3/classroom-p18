<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 เกมติวรายวิชา — ป.1/8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Sarabun:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#8FD3F4; --sky-2:#C7ECFF;
    --ink:#27384A; --ink-soft:#5A6B7D;
    --sun:#FFD23F; --coral:#FF7A6B; --mint:#41C9A0; --grape:#9B6DD6; --sky:#3FA9F5;
    --card:#FFFFFF; --good:#41C9A0; --bad:#FF6B6B;
    --shadow:0 8px 0 rgba(39,56,74,.12), 0 14px 30px rgba(39,56,74,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun',sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#A9C7FF,#C7ECFF);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }
  .wrap{width:100%; max-width:600px; padding:14px 16px 40px; flex:1; display:flex; flex-direction:column;}

  .top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .brand{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.12rem; color:var(--ink); display:flex; align-items:center; gap:7px;}
  .brand .dot{width:14px;height:14px;border-radius:50%;background:var(--sky);box-shadow:0 0 0 4px rgba(63,169,245,.25);}
  .timer{background:#fff; border-radius:999px; padding:6px 14px; font-weight:800; box-shadow:var(--shadow); display:none; align-items:center; gap:6px; font-size:1rem; font-variant-numeric:tabular-nums;}
  .timer.show{display:flex;}

  .screen{display:none; flex:1; flex-direction:column;}
  .screen.active{display:flex; animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

  .shead{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .topback{flex:none; text-decoration:none; background:#fff; border-radius:12px; width:42px; height:42px; display:grid; place-items:center; font-size:1.4rem; font-weight:800; color:var(--ink); box-shadow:var(--shadow); border:0; cursor:pointer;}
  .topback:active{transform:translateY(2px);}
  .stitle{font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.12rem; line-height:1.1;}

  .hero{background:#fff; border-radius:26px; padding:22px 20px; box-shadow:var(--shadow); text-align:center; margin-bottom:16px;}
  .hero .emoji{font-size:2.7rem; line-height:1;}
  .hero h1{font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.55rem; margin:6px 0 2px;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}

  .subjgroup{margin:20px 2px 2px; display:flex; align-items:center; gap:9px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.1rem; color:var(--ink);}
  .subjgroup:first-of-type{margin-top:6px;}
  .subjgroup .ln{flex:1; height:3px; border-radius:3px; background:rgba(39,56,74,.12);}

  .menu{display:flex; flex-direction:column; gap:12px; margin-top:8px;}
  .scard{border:0; cursor:pointer; text-align:left; color:#fff; border-radius:20px; padding:16px 16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow); font-family:'Sarabun',sans-serif; transition:transform .12s; width:100%;}
  .scard:active{transform:translateY(3px);}
  .scard .ic{font-size:1.9rem; background:rgba(255,255,255,.25); width:56px; height:56px; border-radius:15px; display:grid; place-items:center; flex:none;}
  .scard .t{font-size:1.2rem; font-weight:800; line-height:1.15;}
  .scard .d{font-family:'Sarabun',sans-serif; font-weight:700; opacity:.95; font-size:.85rem;}
  .scard .meta{display:inline-block; background:rgba(255,255,255,.28); border-radius:999px; padding:1px 9px; font-size:.72rem; font-weight:800; margin-top:5px;}
  .scard.soon{background:#fff; border:3px dashed #B9CBE0; color:var(--ink-soft); box-shadow:none; opacity:.9; cursor:default;}
  .scard.soon .ic{background:#EEF3F7;}
  .scard.chip-arrow::after{content:'›'; margin-left:auto; font-size:1.8rem; font-weight:800; opacity:.8;}

  .allcard{background:linear-gradient(135deg,#3FA9F5,#2E86DE) !important; border:0;}

  /* ---------- QUIZ ---------- */
  .back{border:0; background:#fff; box-shadow:var(--shadow); border-radius:14px; width:46px; height:46px; font-size:1.3rem; cursor:pointer; flex:none; color:var(--ink); font-weight:800; display:grid; place-items:center;}
  .back:active{transform:translateY(2px);}
  .progress{margin-left:auto; font-weight:800; color:var(--ink-soft); background:#fff; padding:6px 12px; border-radius:999px; box-shadow:var(--shadow); font-size:.95rem;}

  .pbar{height:10px; border-radius:999px; background:#E3ECF5; overflow:hidden; margin-bottom:14px;}
  .pbar .fill{height:100%; border-radius:999px; background:linear-gradient(90deg,#5BC8F0,var(--sky)); transition:width .3s;}

  .panel{background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:20px 16px; flex:1; display:flex; flex-direction:column;}
  .qnum{text-align:center; color:var(--ink-soft); font-weight:800; font-size:.9rem; margin-bottom:4px;}
  .qtext{font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.32rem; text-align:center; line-height:1.35; margin:4px 0 6px; color:var(--ink);}
  .qtext .big{display:block; font-size:2.8rem; margin:6px 0 2px; line-height:1.1;}
  .readbtn{display:block; margin:8px auto 4px; border:0; background:#EEF4FB; color:var(--sky); font-weight:800; font-family:'Sarabun',sans-serif; font-size:.95rem; padding:7px 16px; border-radius:999px; cursor:pointer;}
  .readbtn:active{transform:translateY(2px);}

  .choices{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px;}
  .choice{border:3px solid #E7EEF4; background:#fff; border-radius:18px; padding:16px 10px; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.35rem; cursor:pointer; color:var(--ink); transition:transform .1s, border-color .15s, background .15s; min-height:64px; display:flex; align-items:center; justify-content:center; text-align:center;}
  .choice.long{font-size:1.08rem;}
  .choice:active{transform:scale(.97);}
  .choice.sel{border-color:var(--sky); background:#EAF6FF; color:#1663A6;}
  .choice.correct{border-color:var(--good); background:#E7FBF3; color:#1E8E6E;}
  .choice.wrong{border-color:var(--bad); background:#FFECEC; color:#D64545; animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .choice:disabled{cursor:default;}

  /* ดาวสะสม (มุมขวาบน) */
  .stars{background:#fff; border-radius:999px; padding:6px 13px; font-weight:800; box-shadow:var(--shadow); display:none; align-items:center; gap:6px; font-size:1rem;}
  .stars.show{display:flex;}
  .stars .s{transition:transform .25s;}
  .stars.pop .s{transform:scale(1.5) rotate(18deg);}

  /* ฟีดแบ็กเฉลยทันที */
  .feedback{text-align:center; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.1rem; min-height:26px; margin-top:12px; color:var(--ink-soft);}
  .feedback.good{color:var(--good);} .feedback.bad{color:var(--bad);}

  .nextbtn{margin-top:16px; border:0; background:linear-gradient(135deg,#5BC8F0,var(--sky)); color:#fff; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.2rem; padding:15px; border-radius:18px; box-shadow:var(--shadow); cursor:pointer; opacity:.45; pointer-events:none; transition:opacity .2s;}
  .nextbtn.on{opacity:1; pointer-events:auto;}
  .nextbtn:active{transform:translateY(3px);}

  /* ---------- RESULT ---------- */
  .result{background:#fff; border-radius:26px; box-shadow:var(--shadow); padding:26px 20px; text-align:center;}
  .result .big{font-size:3.4rem;}
  .result h2{font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.6rem; margin:8px 0 2px;}
  .result .score{font-weight:800; color:var(--ink); font-size:1.35rem;}
  .result .pct{color:var(--ink-soft); font-weight:800; margin-top:2px;}
  .result .grade{display:inline-block; margin-top:12px; padding:6px 18px; border-radius:999px; font-weight:800; font-size:1.05rem; color:#fff;}
  .result .rstars{font-size:2rem; margin:12px 0 2px; letter-spacing:6px;}
  .result .rtime{color:var(--ink-soft); font-weight:700; font-size:.95rem; margin-top:6px;}
  .rbtns{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .rbtns button{border:0; border-radius:18px; padding:15px; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.12rem; cursor:pointer; box-shadow:var(--shadow); color:#fff;}
  .r-again{background:linear-gradient(135deg,#5BC8F0,var(--sky));}
  .r-home{background:#fff !important; color:var(--ink) !important; border:3px solid #EEF3F7 !important; box-shadow:none !important;}

  .reviewhead{font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.05rem; color:var(--ink); margin:22px 2px 8px; display:flex; align-items:center; gap:8px;}
  .rev{background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:13px 14px; margin-bottom:10px; border-left:6px solid var(--good);}
  .rev.bad{border-left-color:var(--bad);}
  .rev .rq{font-weight:800; font-size:.98rem; margin-bottom:5px;}
  .rev .ra{font-weight:700; font-size:.9rem; color:#1E8E6E;}
  .rev .yours{font-weight:700; font-size:.88rem; color:var(--bad); margin-top:2px;}

  /* ---------- WRITE (พิมพ์เอง + คีย์บอร์ด a–z) ---------- */
  .writewrap{display:flex; flex-direction:column; gap:12px; margin-top:6px;}
  .writebox{min-height:58px; border:3px solid #E7EEF4; border-radius:16px; background:#FAFCFF; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.7rem; color:var(--ink); padding:8px 12px; letter-spacing:1px; word-break:break-word;}
  .writebox .ph{color:#AEBDCB; font-weight:700; font-size:1.02rem; letter-spacing:0;}
  .writebox .caret{display:inline-block; width:3px; height:1.5rem; background:var(--sky); margin-left:2px; animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  .kbd{display:grid; grid-template-columns:repeat(7,1fr); gap:7px;}
  .kbd .key{aspect-ratio:1/1; border-radius:12px; border:3px solid #E7EEF4; background:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.3rem; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .kbd .key:active{transform:scale(.92);}
  .kbd .kctrl{aspect-ratio:auto; font-family:'Sarabun',sans-serif; font-weight:800; font-size:.92rem; background:#EEF4FB; color:var(--sky);}
  .parentbar{border:2px dashed #E0C878; background:#FFFBEE; border-radius:16px; padding:12px;}
  .parentbar.hidden{display:none;}
  .parentbar .plabel{font-weight:800; color:#9A7B1F; font-size:.92rem; margin-bottom:9px; text-align:center;}
  .parentbar .pbtns{display:flex; gap:10px;}
  .parentbar .pbtn{flex:1; border:0; border-radius:14px; padding:12px; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.05rem; cursor:pointer; color:#fff; transition:transform .1s, opacity .15s;}
  .parentbar .pbtn:active{transform:translateY(2px);}
  .pbtn.ok{background:linear-gradient(135deg,#5BD9B2,#41C9A0);}
  .pbtn.no{background:linear-gradient(135deg,#FF9F8A,#FF6B6B);}
  .parentbar.marked .pbtn{opacity:.4;}
  .parentbar.marked .pbtn.chosen{opacity:1; box-shadow:0 0 0 3px rgba(39,56,74,.15);}
  .checkbtn{background:linear-gradient(135deg,#5BD9B2,#41C9A0) !important;}

  /* ---------- MATCH (จับคู่) ---------- */
  .matchhint{text-align:center; font-weight:800; color:var(--ink-soft); font-size:.95rem; margin:2px 0 12px;}
  .matchwrap{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .mcol{display:flex; flex-direction:column; gap:10px;}
  .mitem{border:3px solid #E7EEF4; background:#fff; border-radius:16px; padding:13px 8px; font-family:'Sarabun',sans-serif; font-weight:800; font-size:1.06rem; color:var(--ink); cursor:pointer; min-height:54px; display:flex; align-items:center; justify-content:center; text-align:center; transition:transform .1s,border-color .15s,background .15s;}
  .mitem:active{transform:scale(.97);}
  .mitem.msel{border-color:var(--sky); background:#EAF6FF; color:#1663A6;}
  .mitem.matched{border-color:var(--good); background:#E7FBF3; color:#1E8E6E; cursor:default; opacity:.85;}
  .mitem.mwrong{border-color:var(--bad); background:#FFECEC; color:#D64545; animation:shake .4s;}

  .confetti{position:fixed; top:-10px; width:11px; height:18px; z-index:50; pointer-events:none; border-radius:2px;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:0;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot"></span> เกมติวรายวิชา · ป.1/8</div>
    <div class="stars" id="starbox"><span class="s">⭐</span><span id="starnum">0</span></div>
  </div>

  <!-- ============ HOME (เลือกวิชา) ============ -->
  <section class="screen active" id="home">
    <div class="shead">
      <a class="topback" href="index.html" title="กลับไปติวเด็ก">‹</a>
      <span class="stitle">เลือกวิชาที่จะติว</span>
    </div>
    <div class="hero">
      <div class="emoji">🎮✨</div>
      <h1>คลังเกมติว รายวิชา</h1>
      <p>เลือกวิชา · เลือกบท · เล่นสนุก เก็บดาว ⭐</p>
    </div>
    <div id="subjlist"></div>
  </section>

  <!-- ============ CHAPTERS (เลือกบท) ============ -->
  <section class="screen" id="chapters">
    <div class="shead">
      <button class="topback" onclick="chaptersBack()" title="เลือกวิชาอื่น">‹</button>
      <span class="stitle" id="chSubjTitle">เลือกบท</span>
    </div>
    <div class="hero">
      <div class="emoji" id="chEmoji">📘</div>
      <h1 id="chName">วิชา</h1>
      <p id="chSub">เลือกบทที่จะทบทวน</p>
    </div>
    <div class="menu" id="chapterlist"></div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section class="screen" id="quiz">
    <div class="shead">
      <button class="back" onclick="quitExam()">‹</button>
      <span class="stitle" id="quizTitle">วิชา</span>
      <span class="progress" id="quizProg">1 / 10</span>
    </div>
    <div class="pbar"><div class="fill" id="pbarFill" style="width:0%"></div></div>
    <div class="panel">
      <div class="qnum" id="qnum"></div>
      <div class="qtext" id="qtext"></div>
      <button class="readbtn" id="readBtn">🔊 อ่านโจทย์ให้ฟัง</button>
      <div class="choices" id="choiceBox"></div>
      <div class="feedback" id="quizFb"></div>
      <button class="nextbtn" id="nextBtn" onclick="nextQuestion()">ข้อต่อไป →</button>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section class="screen" id="result">
    <div class="shead">
      <button class="back" onclick="backFromResult()">‹</button>
      <span class="stitle" id="rSubjTitle">ผลสอบ</span>
    </div>
    <div class="result">
      <div class="big" id="rEmoji">🎉</div>
      <h2 id="rTitle">เก่งมาก!</h2>
      <div class="score" id="rScore">10 / 10</div>
      <div class="pct" id="rPct">100%</div>
      <div class="grade" id="rGrade">ดีเยี่ยม</div>
      <div class="rstars" id="rStars">⭐⭐⭐</div>
      <div class="rtime" id="rTime"></div>
      <div class="rbtns">
        <button class="r-again" id="rAgain">ทำอีกครั้ง</button>
        <button class="r-home" id="rOther">เลือกบท/วิชาอื่น</button>
      </div>
    </div>
    <div class="reviewhead">🔎 เฉลยรายข้อ</div>
    <div id="reviewBox"></div>
  </section>
</div>

<script>
/* ============================================================
   ข้อสอบกลางภาค ป.1/8 — โรงเรียนวิเชียรชม (EP)
   จัดตามรายวิชาในตารางเรียน (แยกทุกวิชา) และเก็บเนื้อหาเป็น "บท"

   โครงสร้างข้อมูล (แก้ที่อาเรย์ SUBJECTS ด้านล่าง):
   -----------------------------------------------------------
   วิชาที่ "แยกเป็นบท":
     { id, group, name, sub, teacher, emoji, color, lang, ready:true,
       chapters:[
         { id:'c1', name:'บทที่ 1 · ...', q:[ ...ข้อสอบ... ] },
         { id:'c2', name:'บทที่ 2 · ...', q:[ ... ] },
         { id:'c3', name:'บทที่ 3 · ...', ready:false },   // บทเปล่า = "รอครูเพิ่มข้อสอบ"
       ] }
     → หน้าเลือกบทจะมีปุ่ม "รวมทุกบท" (ซ้อมสอบจริง) ให้อัตโนมัติ

   วิชาที่ "ไม่แยกเป็นบท" (ชุดเดียว):
     { id, group, name, sub, teacher, emoji, color, lang, ready:true,
       q:[ ...ข้อสอบ... ] }

   รูปแบบ 1 ข้อ:
     { q:'โจทย์ (ใส่ emoji ได้)', a:'คำตอบที่ถูก', x:['ตัวลวง1','ตัวลวง2','ตัวลวง3'], big:'emoji ใหญ่ (ถ้ามี)' }
     * ตัวลวง (x) ต้องมี 3 ตัว → รวมเป็น 4 ตัวเลือก
   lang = 'th' | 'en' | 'zh'  (ใช้กับปุ่มอ่านโจทย์ 🔊)
   ============================================================ */
const SUBJECTS = [
  /* ==================== คณิตศาสตร์ (แยก 3 วิชาตามตาราง) ==================== */
  {
    id:'math-ep', group:'คณิตศาสตร์', name:'MATH', sub:'Mathematics (EP)', teacher:'Ms. Fretzie',
    emoji:'🔢', color:'linear-gradient(135deg,#5BC8F0,#3FA9F5)', lang:'en', ready:true,
    chapters:[
      { id:'c1', name:'Unit 1 · Numbers & Counting', q:[
        {q:'How many apples? 🍎🍎🍎🍎', a:'4', x:['3','5','6']},
        {q:'Count the stars ⭐⭐⭐⭐⭐', a:'5', x:['3','4','6']},
        {q:'What comes after 6?', a:'7', x:['5','6','8']},
        {q:'The word for 9 is…', a:'nine', x:['seven','eight','ten']},
        {q:'Which number is the biggest?', a:'8', x:['3','5','1']},
      ]},
      { id:'c2', name:'Unit 2 · Addition & Subtraction', q:[
        {q:'2 + 3 = ?', a:'5', x:['4','6','7']},
        {q:'5 − 2 = ?', a:'3', x:['2','4','1']},
        {q:'4 + 4 = ?', a:'8', x:['6','7','9']},
        {q:'10 − 5 = ?', a:'5', x:['3','4','6']},
      ]},
      { id:'c3', name:'Unit 3 · Shapes', q:[
        {q:'Which shape is this?', big:'🔺', a:'Triangle', x:['Circle','Square','Star']},
        {q:'A ball ⚽ is a…', a:'Circle', x:['Square','Triangle','Star']},
        {q:'How many corners does a square ⬛ have?', a:'4', x:['3','5','6']},
      ]},
      { id:'c4', name:'Unit 4 · (เพิ่มภายหลัง)', ready:false },
    ],
  },
  {
    id:'math-th', group:'คณิตศาสตร์', name:'คณิต', sub:'คณิตศาสตร์ (ไทย)', teacher:'ครูเฉลิมศักดิ์',
    emoji:'➕', color:'linear-gradient(135deg,#8E7BEF,#6C5CE7)', lang:'th', ready:true,
    chapters:[
      { id:'c1', name:'บทที่ 1 · จำนวนและการนับ', q:[
        {q:'นับดูสิ มีกี่ดวง ⭐⭐⭐⭐⭐⭐', a:'6', x:['5','7','8']},
        {q:'จำนวนที่อยู่ก่อนหน้า 8 คือ?', a:'7', x:['6','9','10']},
        {q:'เลขไทย ๗ ตรงกับเลขใด?', a:'7', x:['5','6','8']},
        {q:'นับต่อ: 2, 4, 6, ___', a:'8', x:['7','9','10']},
      ]},
      { id:'c2', name:'บทที่ 2 · การบวกและการลบ', q:[
        {q:'3 + 4 = ?', a:'7', x:['6','8','9']},
        {q:'9 − 4 = ?', a:'5', x:['4','6','3']},

/* ============ helpers ============ */
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}
function stripEmoji(s){ return s.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}️]/gu,'').replace(/\s+/g,' ').trim(); }
function readyChapters(subj){ return (subj.chapters||[]).filter(c=>c.ready!==false && c.q && c.q.length); }

/* ============ read-aloud (best effort) ============ */
let voices=[];
function loadVoices(){ if('speechSynthesis' in window) voices=speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
const LANGMAP={th:'th-TH', en:'en-US', zh:'zh-CN'};
function readAloud(text, lang){
  if(!('speechSynthesis' in window)) return;
  try{ speechSynthesis.cancel(); }catch(e){}
  const u=new SpeechSynthesisUtterance(stripEmoji(text));
  const code=LANGMAP[lang]||'th-TH';
  u.lang=code; u.rate= lang==='th'?.85:.9; u.pitch=1.05;
  const v=voices.find(v=>v.lang && v.lang.toLowerCase().startsWith(code.slice(0,2).toLowerCase()));
  if(v) u.voice=v;
  try{ speechSynthesis.speak(u); }catch(e){}
}

/* ============ HOME (เลือกวิชา) ============ */
function renderHome(){
  const box=document.getElementById('subjlist');
  const order=[]; const groups={};
  SUBJECTS.forEach(s=>{ if(!groups[s.group]){ groups[s.group]=[]; order.push(s.group); } groups[s.group].push(s); });
  box.innerHTML=order.map(g=>{
    const head=`<div class="subjgroup"><span>${g}</span><span class="ln"></span></div><div class="menu">`;
    const cards=groups[g].map(s=>{
      if(!s.ready){
        return `<div class="scard soon"><span class="ic">${s.emoji}</span>
          <span><span class="t">${s.name}</span><br><span class="d">${s.sub}</span>
          <br><span class="meta">รอครูเพิ่มข้อสอบ</span></span></div>`;
      }
      const nCh = s.chapters ? readyChapters(s).length : 0;
      const nQ  = s.chapters ? readyChapters(s).reduce((n,c)=>n+c.q.length,0) : s.q.length;
      const metaTxt = s.chapters ? `${nCh} บท · ${nQ} ข้อ` : `${nQ} ข้อ`;
      return `<button class="scard chip-arrow" style="background:${s.color}" onclick="openSubject('${s.id}')">
        <span class="ic">${s.emoji}</span>
        <span><span class="t">${s.name}</span><br><span class="d">${s.sub} · ${s.teacher}</span>
        <br><span class="meta">${metaTxt}</span></span></button>`;
    }).join('');
    return head+cards+`</div>`;
  }).join('');
}

/* ============ เลือกวิชา → เลือกบท หรือ เริ่มสอบเลย ============ */
let curSubj=null;
function openSubject(id){
  const subj=SUBJECTS.find(s=>s.id===id);
  if(!subj||!subj.ready) return;
  curSubj=subj;
  if(subj.chapters){ renderChapters(subj); show('chapters'); }
  else { startExam(subj, subj.q, subj.name, 'all'); }
}
function renderChapters(subj){
  document.getElementById('chSubjTitle').textContent=subj.name;
  document.getElementById('chEmoji').textContent=subj.emoji;
  document.getElementById('chName').textContent=subj.name;
  document.getElementById('chSub').textContent=subj.sub+' · '+subj.teacher;
  const list=document.getElementById('chapterlist');
  const ready=readyChapters(subj);
  const allQ=ready.reduce((arr,c)=>arr.concat(c.q),[]);
  let html='';
  // การ์ด "รวมทุกบท" — คละ MC ทุกบท
  if(ready.length>1){
    html+=`<button class="scard allcard chip-arrow" onclick="startAll('${subj.id}')">
      <span class="ic">🎯</span>
      <span><span class="t">รวมทุกบท</span><br><span class="d">ทบทวนคละทุกบท · สุ่ม</span>
      <br><span class="meta">${allQ.length} ข้อ</span></span></button>`;
  }
  // การ์ดแต่ละบท
  html+=(subj.chapters||[]).map(c=>{
    if(c.ready===false || !c.q || !c.q.length){
      return `<div class="scard soon"><span class="ic">📄</span>
        <span><span class="t">${c.name}</span><br><span class="meta">รอครูเพิ่มข้อสอบ</span></span></div>`;
    }
    return `<button class="scard chip-arrow" style="background:${subj.color}" onclick="startChapter('${subj.id}','${c.id}')">
      <span class="ic">📘</span>
      <span><span class="t">${c.name}</span><br><span class="meta">${c.q.length} ข้อ</span></span></button>`;
  }).join('');
  // เกมสนุก — แยกเป็นเกมๆ (เลือกเล่นทีละเกม)
  if(subj.games && subj.games.length){
    html+=`<div class="subjgroup"><span>🎲 เกมสนุก</span><span class="ln"></span></div>`;
    html+=subj.games.map(g=>`<button class="scard chip-arrow" style="background:${g.color||'linear-gradient(135deg,#5BD9B2,#41C9A0)'}" onclick="startGame('${subj.id}','${g.id}')">
      <span class="ic">${g.emoji}</span>
      <span><span class="t">${g.name}</span><br><span class="d">${g.desc||''}</span><br><span class="meta">${g.q.length} ข้อ</span></span></button>`).join('');
  }
  list.innerHTML=html;
}
function startChapter(subjId, chId){
  const subj=SUBJECTS.find(s=>s.id===subjId);
  const ch=subj.chapters.find(c=>c.id===chId);
  startExam(subj, ch.q, ch.name, chId);
}
function startAll(subjId){
  const subj=SUBJECTS.find(s=>s.id===subjId);
  const allQ=readyChapters(subj).reduce((arr,c)=>arr.concat(c.q),[]);
  startExam(subj, allQ, 'รวมทุกบท', 'all');
}
function startGame(subjId, gameId){
  const subj=SUBJECTS.find(s=>s.id===subjId);
  const g=(subj.games||[]).find(x=>x.id===gameId);
  if(g) startExam(subj, g.q, g.name, 'game-'+gameId);
}

/* ============ EXAM ============ */
let exam=null; // {subj, pool, label, modeId, list, idx, answers, startTs, timerInt}

function startExam(subj, pool, label, modeId){
  const list=shuffle(pool.slice()).map(item=>{
    if(item.type==='write') return { type:'write', q:item.q, big:item.big||'', ph:item.ph||'พิมพ์คำตอบ (a–z)' };
    if(item.type==='fill')  return { type:'fill',  q:item.q, big:item.big||'', ph:item.ph||'พิมพ์คำตอบ (a–z)', correct:item.a };
    if(item.type==='match') return { type:'match', q:item.q, pairs:item.pairs.slice() };
    return { q:item.q, big:item.big||'', choices:shuffle([item.a, ...item.x]), correct:item.a };
  });
  exam={ subj, pool, label, modeId, list, idx:0,
    answers:new Array(list.length).fill(null),   // MC:ค่าที่เลือก | write/fill:ข้อความ | match:สรุป
    parentOk:new Array(list.length).fill(null),  // write: ผู้ปกครองตรวจ true/false
    gotOk:new Array(list.length).fill(null),     // fill/match: ถูกไหม (true/false)
    done:new Array(list.length).fill(false),     // ตอบครบพร้อมไปข้อต่อไปหรือยัง
    score:0 };
  stars=0; document.getElementById('starnum').textContent='0';
  document.getElementById('starbox').classList.add('show');
  document.getElementById('quizTitle').textContent=subj.name;
  show('quiz'); renderQuestion();
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function renderQuestion(){
  const total=exam.list.length, q=exam.list[exam.idx];
  document.getElementById('quizProg').textContent=`${exam.idx+1} / ${total}`;
  document.getElementById('pbarFill').style.width=((exam.idx)/total*100)+'%';
  document.getElementById('qnum').textContent=`ข้อ ${exam.idx+1}`;
  document.getElementById('qtext').innerHTML=(q.big?`<span class="big">${q.big}</span>`:'')+q.q;
  const nb=document.getElementById('nextBtn');
  nb.textContent= exam.idx===total-1 ? 'ดูผลคะแนน ✓' : 'ข้อต่อไป →';
  nb.classList.remove('on');
  const fb=document.getElementById('quizFb'); fb.textContent=''; fb.className='feedback';
  const box=document.getElementById('choiceBox'); box.innerHTML='';

  if(q.type==='write'){ renderWrite(q, box); }
  else if(q.type==='fill'){ renderFill(q, box); }
  else if(q.type==='match'){ renderMatch(q, box); }
  else {
    q.choices.forEach(c=>{
      const b=document.createElement('button');
      b.className='choice'+(c.length>10?' long':'');
      b.textContent=c;
      b.onclick=()=>pickAnswer(b,c);
      box.appendChild(b);
    });
  }
}
// เกมติว: เฉลยทันที + ได้ดาว (นับถูกจากครั้งแรกที่เลือก)
function pickAnswer(btn,val){
  const q=exam.list[exam.idx];
  const box=document.getElementById('choiceBox');
  box.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('quizFb');
  exam.answers[exam.idx]=val; exam.done[exam.idx]=true;
  if(val===q.correct){
    btn.classList.add('correct'); exam.score++; addStar(); miniConfetti();
    fb.textContent='ถูกต้อง! 🌟'; fb.className='feedback good';
  } else {
    btn.classList.add('wrong');
    box.querySelectorAll('.choice').forEach(b=>{ if(b.textContent===q.correct) b.classList.add('correct'); });
    fb.textContent='คำตอบที่ถูกคือ  "'+q.correct+'"'; fb.className='feedback bad';
  }
  if(exam.subj.lang!=='th') readAloud(q.correct, exam.subj.lang);
  document.getElementById('nextBtn').classList.add('on');
}
function nextQuestion(){
  if(!exam.done[exam.idx]) return;
  if(exam.idx < exam.list.length-1){ exam.idx++; renderQuestion(); }
  else finishExam();
}
let stars=0;
function addStar(){
  stars++; const el=document.getElementById('starnum'); if(el) el.textContent=stars;
  const sb=document.getElementById('starbox'); if(sb){ sb.classList.add('pop'); setTimeout(()=>sb.classList.remove('pop'),260); }
}

/* ---------- WRITE / FILL: พิมพ์เองด้วยคีย์บอร์ด a–z ---------- */
function keyboardHTML(){
  const keys='abcdefghijklmnopqrstuvwxyz'.split('')
    .map(l=>`<button class="key" onclick="typeLetter('${l}')">${l}</button>`).join('');
  return `<div class="kbd">${keys}
      <button class="key kctrl" style="grid-column:span 4" onclick="typeSpace()">␣ เว้นวรรค</button>
      <button class="key kctrl" style="grid-column:span 3" onclick="typeBack()">⌫ ลบ</button>
    </div>`;
}
// write = ข้อมูลส่วนตัว ไม่มีถูก/ผิด → ผู้ปกครองตรวจ
function renderWrite(q, box){
  box.innerHTML=`<div class="writewrap">
      <div class="writebox" id="writeDisp"></div>
      ${keyboardHTML()}
      <div class="parentbar hidden" id="parentBar">
        <div class="plabel">👨‍👩‍👧 ให้คุณพ่อคุณแม่ช่วยตรวจ — ตอบถูกไหม?</div>
        <div class="pbtns">
          <button class="pbtn ok" onclick="parentMark(true)">✓ ถูกต้อง</button>
          <button class="pbtn no" onclick="parentMark(false)">✗ ยังไม่ถูก</button>
        </div>
      </div>
    </div>`;
  refreshWrite();
}
// fill = เติมคำที่มีคำตอบตายตัว → ตรวจอัตโนมัติ
function renderFill(q, box){
  box.innerHTML=`<div class="writewrap">
      <div class="writebox" id="writeDisp"></div>
      ${keyboardHTML()}
      <button class="nextbtn checkbtn" id="checkBtn" onclick="checkFill()">ตรวจคำตอบ ✓</button>
    </div>`;
  refreshWrite();
}
function refreshWrite(){
  const q=exam.list[exam.idx];
  const disp=document.getElementById('writeDisp'); if(!disp) return;
  const t=exam.answers[exam.idx]||'';
  disp.innerHTML = (t ? esc(t) : `<span class="ph">${esc(q.ph)}</span>`) + '<span class="caret"></span>';
  const bar=document.getElementById('parentBar');
  if(bar){
    bar.classList.toggle('hidden', t.length===0);
    bar.classList.remove('marked');
    bar.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('chosen'));
    const mk=exam.parentOk[exam.idx];
    if(mk!==null && t.length){ bar.classList.add('marked'); bar.querySelector(mk?'.pbtn.ok':'.pbtn.no').classList.add('chosen'); }
  }
  const cb=document.getElementById('checkBtn');
  if(cb && !cb.disabled) cb.classList.toggle('on', t.length>0);
}
function typeLetter(l){
  const ty=exam.list[exam.idx].type;
  if(ty!=='write'&&ty!=='fill') return;
  exam.answers[exam.idx]=(exam.answers[exam.idx]||'')+l;
  exam.parentOk[exam.idx]=null; exam.gotOk[exam.idx]=null; exam.done[exam.idx]=false;
  document.getElementById('nextBtn').classList.remove('on');
  refreshWrite();
}
function typeSpace(){ if((exam.answers[exam.idx]||'').length) typeLetter(' '); }
function typeBack(){
  const t=exam.answers[exam.idx]||'';
  exam.answers[exam.idx]=t.slice(0,-1);
  exam.parentOk[exam.idx]=null; exam.gotOk[exam.idx]=null; exam.done[exam.idx]=false;
  document.getElementById('nextBtn').classList.remove('on');
  refreshWrite();
}
function parentMark(ok){
  if(!(exam.answers[exam.idx]||'').length) return;
  exam.parentOk[exam.idx]=ok; exam.done[exam.idx]=true;
  const fb=document.getElementById('quizFb');
  if(ok){ addStar(); miniConfetti(); fb.textContent='เก่งมาก! 🌟'; fb.className='feedback good'; }
  else { fb.textContent='ลองฝึกเขียนอีกครั้งนะ 💪'; fb.className='feedback bad'; }
  document.getElementById('nextBtn').classList.add('on');
  refreshWrite();
}
function norm(s){ return String(s).toLowerCase().replace(/[^a-z0-9ก-๙]/g,''); }
function checkFill(){
  const q=exam.list[exam.idx];
  const t=(exam.answers[exam.idx]||'').trim();
  if(!t) return;
  document.querySelectorAll('.kbd .key').forEach(k=>k.disabled=true);
  const cb=document.getElementById('checkBtn'); if(cb){ cb.classList.remove('on'); cb.disabled=true; cb.style.display='none'; }
  exam.done[exam.idx]=true;
  const ok = norm(t)===norm(q.correct);
  exam.gotOk[exam.idx]=ok;
  const fb=document.getElementById('quizFb');
  if(ok){ addStar(); miniConfetti(); fb.textContent='ถูกต้อง! 🌟'; fb.className='feedback good'; }
  else { fb.textContent='คำตอบที่ถูกคือ  "'+q.correct+'"'; fb.className='feedback bad'; }
  document.getElementById('nextBtn').classList.add('on');
}

/* ---------- MATCH: จับคู่ (แตะซ้าย→แตะขวา) ---------- */
let matchState=null;
function renderMatch(q, box){
  const lefts=q.pairs.map(p=>p[0]);
  const rights=shuffle(q.pairs.map(p=>p[1]));
  const map={}; q.pairs.forEach(p=>map[p[0]]=p[1]);
  matchState={ map, sel:null, done:0, wrong:0, total:q.pairs.length };
  const col=(arr,side)=>arr.map(v=>`<button class="mitem" onclick="matchTap('${side}',this)" data-v="${esc(v)}">${esc(v)}</button>`).join('');
  box.innerHTML=`<div class="matchhint">แตะฝั่งซ้าย แล้วแตะคู่ที่ถูกฝั่งขวา 👉</div>
    <div class="matchwrap"><div class="mcol">${col(lefts,'L')}</div><div class="mcol">${col(rights,'R')}</div></div>`;
}
function matchTap(side, btn){
  if(btn.classList.contains('matched')) return;
  const st=matchState; const val=btn.dataset.v;
  if(!st.sel){ st.sel={side,val,btn}; btn.classList.add('msel'); return; }
  if(st.sel.side===side){ st.sel.btn.classList.remove('msel'); st.sel={side,val,btn}; btn.classList.add('msel'); return; }
  const leftVal = side==='L'?val:st.sel.val;
  const rightVal = side==='R'?val:st.sel.val;
  const other=st.sel.btn; other.classList.remove('msel'); st.sel=null;
  if(st.map[leftVal]===rightVal){
    btn.classList.add('matched'); other.classList.add('matched'); btn.disabled=true; other.disabled=true;
    st.done++;
    if(st.done===st.total){
      exam.done[exam.idx]=true; exam.gotOk[exam.idx]=(st.wrong===0); exam.answers[exam.idx]='จับคู่ครบ '+st.total+' คู่';
      const fb=document.getElementById('quizFb');
      if(st.wrong===0){ addStar(); miniConfetti(); fb.textContent='จับคู่ครบ ถูกหมดเลย! 🌟'; fb.className='feedback good'; }
      else { fb.textContent='จับคู่ครบแล้ว เก่งมาก 👍'; fb.className='feedback good'; }
      document.getElementById('nextBtn').classList.add('on');
    }
  } else {
    st.wrong++;
    btn.classList.add('mwrong'); other.classList.add('mwrong');
    setTimeout(()=>{ btn.classList.remove('mwrong'); other.classList.remove('mwrong'); }, 480);
  }
}
function quitExam(){
  if(confirm('ออกจากเกม? ดาวรอบนี้จะยังไม่ถูกบันทึก')){
    document.getElementById('starbox').classList.remove('show');
    if(exam.subj.chapters){ renderChapters(exam.subj); show('chapters'); }
    else goHome();
  }
}

/* ============ RESULT ============ */
function finishExam(){
  document.getElementById('starbox').classList.remove('show');
  const total=exam.list.length;
  let score=0;
  exam.list.forEach((q,i)=>{
    if(q.type==='write'){ if(exam.parentOk[i]) score++; }
    else if(q.type==='fill'||q.type==='match'){ if(exam.gotOk[i]) score++; }
    else if(exam.answers[i]===q.correct) score++;
  });
  const pct=Math.round(score/total*100);

  const title = exam.subj.name + (exam.subj.chapters ? ' · '+exam.label : '');
  document.getElementById('rSubjTitle').textContent='สรุปผล · '+title;
  document.getElementById('rScore').textContent=score+' / '+total+' ข้อ';
  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('rTime').textContent=`⭐ เก็บดาวได้ ${score} ดวง`;

  let grade, gcolor, emoji, rtitle, rstars;
  if(pct>=80){ grade='เยี่ยมไปเลย'; gcolor='#2FB58C'; emoji='🏆'; rtitle='เก่งมาก!'; rstars='⭐⭐⭐'; }
  else if(pct>=60){ grade='เก่งมาก'; gcolor='#3FA9F5'; emoji='🎉'; rtitle='ทำได้ดีมาก!'; rstars='⭐⭐'; }
  else if(pct>=50){ grade='ดีขึ้นเรื่อยๆ'; gcolor='#FF9F1C'; emoji='💪'; rtitle='เกือบแล้ว สู้ๆ!'; rstars='⭐'; }
  else { grade='ฝึกอีกนิด'; gcolor='#FF6B6B'; emoji='📚'; rtitle='ลองเล่นอีกครั้งนะ'; rstars='⭐'; }
  const g=document.getElementById('rGrade'); g.textContent=grade; g.style.background=gcolor;
  document.getElementById('rEmoji').textContent=emoji;
  document.getElementById('rTitle').textContent=rtitle;
  document.getElementById('rStars').textContent=rstars;

  document.getElementById('reviewBox').innerHTML=exam.list.map((q,i)=>{
    if(q.type==='write'){
      const ok=exam.parentOk[i]===true;
      const mk = exam.parentOk[i]===null ? '—' : (ok?'ถูก ✓':'ยังไม่ถูก ✗');
      return `<div class="rev${ok?'':' bad'}">
        <div class="rq">${ok?'✅':'❌'} ข้อ ${i+1}. ${esc(q.q)}</div>
        <div class="ra">✍️ คำตอบของหนู: ${esc(exam.answers[i]||'—')}</div>
        <div class="yours" style="color:#5A6B7D">👨‍👩‍👧 ผู้ปกครองตรวจ: ${mk}</div></div>`;
    }
    if(q.type==='fill'){
      const ok=exam.gotOk[i]===true;
      return `<div class="rev${ok?'':' bad'}">
        <div class="rq">${ok?'✅':'❌'} ข้อ ${i+1}. ${esc(q.q)}</div>
        <div class="ra">✓ คำตอบที่ถูก: ${esc(q.correct)}</div>
        ${ok?'':`<div class="yours">✍️ หนูพิมพ์: ${esc(exam.answers[i]||'—')}</div>`}</div>`;
    }
    if(q.type==='match'){
      const ok=exam.gotOk[i]===true;
      const pairsTxt=q.pairs.map(p=>`${esc(p[0])} – ${esc(p[1])}`).join(' · ');
      return `<div class="rev${ok?'':' bad'}">
        <div class="rq">${ok?'✅':'⭕'} ข้อ ${i+1}. ${esc(q.q)}</div>
        <div class="ra">✓ คู่ที่ถูก: ${pairsTxt}</div></div>`;
    }
    const ok=exam.answers[i]===q.correct;
    const yours = ok ? '' : `<div class="yours">✗ คำตอบของหนู: ${exam.answers[i]||'—'}</div>`;
    return `<div class="rev${ok?'':' bad'}">
      <div class="rq">${ok?'✅':'❌'} ข้อ ${i+1}. ${q.q}</div>
      <div class="ra">✓ คำตอบที่ถูก: ${q.correct}</div>${yours}</div>`;
  }).join('');

  document.getElementById('rAgain').onclick=()=>startExam(exam.subj, exam.pool, exam.label, exam.modeId);
  document.getElementById('rOther').textContent = exam.subj.chapters ? 'เลือกบทอื่น' : 'เลือกวิชาอื่น';
  if(window.P18Auth) P18Auth.saveScore('exam', exam.subj.id+'/'+exam.modeId, score, total);
  show('result');
  if(pct>=60) bigConfetti();
}
function backFromResult(){
  if(exam && exam.subj.chapters){ renderChapters(exam.subj); show('chapters'); }
  else exitToHub();
}
// มาจากหน้าคลังเกมติว (deep-link) → กลับไปหน้านั้น, ถ้าเปิด exam.html ตรงๆ → กลับหน้าเลือกวิชาในตัว
let deepLinked=false;
function exitToHub(){ if(deepLinked) location.href='index.html'; else goHome(); }
function chaptersBack(){ exitToHub(); }

/* ============ nav ============ */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('readBtn').style.display = (id==='quiz')?'block':'none';
  window.scrollTo(0,0);
}
function goHome(){
  if('speechSynthesis' in window){ try{ speechSynthesis.cancel(); }catch(e){} }
  document.getElementById('starbox').classList.remove('show');
  show('home');
}
document.getElementById('readBtn').onclick=()=>{
  if(!exam) return;
  const q=exam.list[exam.idx];
  const txt = q.choices ? (q.q + '. ' + q.choices.join(', ')) : q.q;
  readAloud(txt, exam.subj.lang);
};
// ปุ่ม "เลือกบท/วิชาอื่น" บนหน้าผลสอบ
document.getElementById('rOther').onclick=()=>backFromResult();

/* ============ confetti ============ */
const COLORS=['#FFD23F','#FF7A6B','#41C9A0','#9B6DD6','#3FA9F5'];
function miniConfetti(){ confettiBurst(14); }
function bigConfetti(){ confettiBurst(56); }
function confettiBurst(n){
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=COLORS[i%COLORS.length];
    c.style.animation=`fall ${1+Math.random()*1.2}s ${Math.random()*.3}s linear forwards`;
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2600);
  }
}

/* ปลุก speechSynthesis ครั้งแรก */
document.body.addEventListener('click',function once(){ try{ if(window.speechSynthesis) speechSynthesis.resume(); }catch(e){}; document.body.removeEventListener('click',once); }, {once:true});

renderHome();
/* deep-link: exam.html?subj=<id> → เปิดวิชานั้นเลย (มาจากการ์ดวิชาในหน้าคลังเกมติว) */
(function(){
  const sid=new URLSearchParams(location.search).get('subj');
  if(!sid) return;
  const s=SUBJECTS.find(x=>x.id===sid);
  if(s && s.ready){ deepLinked=true; openSubject(sid); }
})();
</script>
