<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 ติวเด็ก ป.1/8 — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&family=Sarabun:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#8FD3F4; --sky-2:#C7ECFF;
    --ink:#27384A; --ink-soft:#5A6B7D;
    --shadow:0 8px 0 rgba(39,56,74,.12), 0 14px 30px rgba(39,56,74,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun','Nunito',sans-serif; color:var(--ink);
    background:linear-gradient(160deg,var(--sky-1),var(--sky-2));
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:560px; padding:14px 16px 40px; flex:1;}
  .shead{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .back{border:0; background:#fff; box-shadow:var(--shadow); border-radius:14px; width:46px; height:46px; font-size:1.3rem; cursor:pointer; flex:none; color:var(--ink); font-weight:800; text-decoration:none; display:grid; place-items:center;}
  .back:active{transform:translateY(2px);}
  .stitle{font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.25rem;}
  .hero{background:#fff; border-radius:24px; padding:20px; box-shadow:var(--shadow); text-align:center; margin-bottom:16px;}
  .hero .emoji{font-size:2.6rem;}
  .hero h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.5rem; margin:6px 0 2px;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}

  .grid{display:flex; flex-direction:column; gap:14px;}
  .gcard{
    border:0; cursor:pointer; text-align:left; color:#fff; border-radius:22px;
    padding:18px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow);
    font-family:'Fredoka',sans-serif; text-decoration:none; transition:transform .12s;
  }
  .gcard:active{transform:translateY(3px);}
  .gcard .ic{font-size:2.2rem; background:rgba(255,255,255,.25); width:60px; height:60px; border-radius:16px; display:grid; place-items:center; flex:none;}
  .gcard .t{font-size:1.3rem; font-weight:700; line-height:1.15;}
  .gcard .d{font-family:'Sarabun',sans-serif; font-weight:700; opacity:.95; font-size:.92rem;}
  .gcard .tag{display:inline-block; background:rgba(255,255,255,.3); border-radius:999px; padding:1px 9px; font-family:'Nunito'; font-size:.72rem; font-weight:800; margin-top:5px;}

  .soon{background:#fff; border:3px dashed #C7D6E2; color:var(--ink-soft); box-shadow:none; opacity:.85;}
  .soon .ic{background:#EEF3F7;}
  .empty{text-align:center; color:var(--ink-soft); font-weight:700; padding:30px 10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="shead">
    <a class="back" href="../index.html" title="กลับหน้าหลัก">‹</a>
    <span class="stitle">🎮 ติวเด็ก</span>
  </div>

  <div class="hero">
    <div class="emoji">📚✨</div>
    <h1>คลังเกมติว ป.1/8</h1>
    <p>เลือกเกมเพื่อเริ่มฝึก</p>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
/* ============================================================
   คลังเกม — เพิ่มเกมใหม่: เพิ่ม 1 อ็อบเจกต์ในอาเรย์นี้
   file  = ชื่อไฟล์ html ในโฟลเดอร์ practice/
   ready = false → แสดงเป็น "เร็วๆ นี้" (ยังกดเข้าไม่ได้)
   ============================================================ */
const GAMES = [
  {
    title: 'Vocabulary',
    desc: 'คลังคำศัพท์ · ฟัง/แปล/จับคู่ (เพิ่มคำเรื่อยๆ)',
    subject: 'English',
    emoji: '📚',
    color: 'linear-gradient(135deg,#FF8E7A,#FF7A6B)',
    file: 'vocabulary.html',
    ready: true,
  },
  {
    title: 'Body & Senses',
    desc: 'ร่างกาย & ประสาทสัมผัส — ฟัง/เลือกคำ/จับคู่',
    subject: 'English',
    emoji: '🧒',
    color: 'linear-gradient(135deg,#FF8E7A,#FF7A6B)',
    file: 'body-senses.html',
    ready: true,
  },
  {
    title: 'Numbers · Unit 2',
    desc: 'นับจำนวน · have/has · คำศัพท์เครื่องเขียน',
    subject: 'English',
    emoji: '🔢',
    color: 'linear-gradient(135deg,#5BC8F0,#3FA9F5)',
    file: 'numbers.html',
    ready: true,
  },
  {
    title: 'ABC Phonics',
    desc: 'เสียงตัวอักษร A–Z · เสียงต้นคำ · ฝึกอ่าน',
    subject: 'English',
    emoji: '🔤',
    color: 'linear-gradient(135deg,#A988E0,#9B6DD6)',
    file: 'phonics.html',
    ready: true,
  },
];

function render(){
  const grid = document.getElementById('grid');
  if(!GAMES.length){ grid.innerHTML = '<div class="empty">ยังไม่มีเกม — เพิ่มได้ในไฟล์ practice/index.html</div>'; return; }
  grid.innerHTML = GAMES.map(g => {
    const inner = `
      <span class="ic">${g.emoji}</span>
      <span>
        <span class="t">${g.title}</span>
        <br><span class="d">${g.desc}</span>
        <br><span class="tag">${g.ready ? g.subject : 'เร็วๆ นี้'}</span>
      </span>`;
    if(g.ready){
      return `<a class="gcard" style="background:${g.color}" href="${g.file}">${inner}</a>`;
    }
    return `<div class="gcard soon">${inner}</div>`;
  }).join('');
}
render();
</script>
</body>
</html>
