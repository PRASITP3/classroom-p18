<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 ติวเด็ก ป.1/8 — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&family=Sarabun:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#8FD3F4; --sky-2:#C7ECFF;
    --ink:#27384A; --ink-soft:#5A6B7D;
    --shadow:0 8px 0 rgba(39,56,74,.12), 0 14px 30px rgba(39,56,74,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun','Nunito',sans-serif; color:var(--ink);
    background:linear-gradient(160deg,var(--sky-1),var(--sky-2));
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:560px; padding:14px 16px 40px; flex:1;}
  .shead{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .back{border:0; background:#fff; box-shadow:var(--shadow); border-radius:14px; width:46px; height:46px; font-size:1.3rem; cursor:pointer; flex:none; color:var(--ink); font-weight:800; text-decoration:none; display:grid; place-items:center;}
  .back:active{transform:translateY(2px);}
  .stitle{font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.25rem;}
  .hero{background:#fff; border-radius:24px; padding:20px; box-shadow:var(--shadow); text-align:center; margin-bottom:16px;}
  .hero .emoji{font-size:2.6rem;}
  .hero h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.5rem; margin:6px 0 2px;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}

  .grid{display:flex; flex-direction:column; gap:14px;}
  .gcard{
    border:0; cursor:pointer; text-align:left; color:#fff; border-radius:22px;
    padding:18px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow);
    font-family:'Fredoka',sans-serif; text-decoration:none; transition:transform .12s;
  }
  .gcard:active{transform:translateY(3px);}
  .gcard .ic{font-size:2.2rem; background:rgba(255,255,255,.25); width:60px; height:60px; border-radius:16px; display:grid; place-items:center; flex:none;}
  .gcard .t{font-size:1.3rem; font-weight:700; line-height:1.15;}
  .gcard .d{font-family:'Sarabun',sans-serif; font-weight:700; opacity:.95; font-size:.92rem;}
  .gcard .tag{display:inline-block; background:rgba(255,255,255,.3); border-radius:999px; padding:1px 9px; font-family:'Nunito'; font-size:.72rem; font-weight:800; margin-top:5px;}

  .soon{background:#fff; border:3px dashed #C7D6E2; color:var(--ink-soft); box-shadow:none; opacity:.85;}
  .soon .ic{background:#EEF3F7;}
  .empty{text-align:center; color:var(--ink-soft); font-weight:700; padding:30px 10px;}

  .subj{display:flex; align-items:center; gap:9px; margin:22px 2px 2px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.15rem; color:var(--ink);}
  .subj:first-child{margin-top:4px;}
  .subj .sj-ic{font-size:1.25rem;}
  .subj .sj-line{flex:1; height:3px; border-radius:3px; background:rgba(39,56,74,.12);}

  /* การ์ดข้อสอบกลางภาค (เด่นที่สุด อยู่บนสุด) */
  .exam-cta{display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff; border-radius:22px; padding:18px;
    background:linear-gradient(135deg,#6C5CE7,#8E7BEF); box-shadow:var(--shadow); margin-bottom:6px; position:relative; overflow:hidden;
    font-family:'Fredoka',sans-serif; transition:transform .12s;}
  .exam-cta:active{transform:translateY(3px);}
  .exam-cta .ic{font-size:2.2rem; background:rgba(255,255,255,.25); width:60px; height:60px; border-radius:16px; display:grid; place-items:center; flex:none;}
  .exam-cta .t{font-size:1.3rem; font-weight:700; line-height:1.15;}
  .exam-cta .d{font-family:'Sarabun',sans-serif; font-weight:700; opacity:.95; font-size:.9rem;}
  .exam-cta .tag{display:inline-block; background:#FFD23F; color:#5A3C00; border-radius:999px; padding:1px 10px; font-family:'Nunito'; font-size:.72rem; font-weight:800; margin-top:5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="shead">
    <a class="back" href="../index.html" title="กลับหน้าหลัก">‹</a>
    <span class="stitle">🎮 ติวเด็ก</span>
  </div>

  <div class="hero">
    <div class="emoji">📚✨</div>
    <h1>คลังเกมติว ป.1/8</h1>
    <p>เลือกเกมเพื่อเริ่มฝึก</p>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
/* ============================================================
   คลังเกมติว — แยกตามวิชาในตารางเรียน ป.1/8 (EP)
   การ์ด "ทบทวน" (tag) → เข้าเกมติวรายวิชา exam.html?subj=<id> (มีหลายบท)
   การ์ด "เกมฝึก" → เกมย่อยไฟล์ของตัวเอง (ฝึกเสริม)
   เพิ่ม/แก้ได้ที่อาเรย์ GAMES ด้านล่าง (group ต้องตรงกับ GROUPS)
   ============================================================ */
const GROUPS = [
  { name:'คณิตศาสตร์',   icon:'🔢' },
  { name:'วิทยาศาสตร์',  icon:'🔬' },
  { name:'ภาษาไทย',      icon:'🇹🇭' },
  { name:'ภาษาจีน',      icon:'🇨🇳' },
  { name:'อังกฤษ (EP)',  icon:'🇬🇧' },
  { name:'สังคมศึกษา',   icon:'🌏' },
  { name:'ฝึกเสริม',     icon:'✨' },
];
const GAMES = [
  // ---------- คณิตศาสตร์ ----------
  { group:'คณิตศาสตร์', title:'MATH', desc:'Numbers 0–10 · Addition within 9 · Ms. Fretzie', emoji:'🔢', color:'linear-gradient(135deg,#5BC8F0,#3FA9F5)', href:'exam.html?subj=math-ep', tag:'ทบทวน' },
  { group:'คณิตศาสตร์', title:'คณิต', desc:'คณิตศาสตร์ (ไทย) · ครูเฉลิมศักดิ์', emoji:'➕', color:'linear-gradient(135deg,#8E7BEF,#6C5CE7)', href:'exam.html?subj=math-th', tag:'ทบทวน' },
  { group:'คณิตศาสตร์', title:'จินตคณิต', desc:'คิดเลขเร็ว · ครูดนิตา', emoji:'🧠', color:'linear-gradient(135deg,#FF9F68,#FF7A6B)', href:'exam.html?subj=math-mental', tag:'ทบทวน' },
  // ---------- วิทยาศาสตร์ ----------
  { group:'วิทยาศาสตร์', title:'วิทย์', desc:'วิทยาศาสตร์ (ไทย) · ครูกวีวรรณ', emoji:'🔬', color:'linear-gradient(135deg,#41C9A0,#2FB58C)', href:'exam.html?subj=sci-th', tag:'ทบทวน' },
  { group:'วิทยาศาสตร์', title:'SCI', desc:'Science (EP) · Mr. Baguinang', emoji:'🧪', color:'linear-gradient(135deg,#4ED6B6,#20B39A)', href:'exam.html?subj=sci-ep', tag:'ทบทวน' },
  // ---------- ภาษาไทย ----------
  { group:'ภาษาไทย', title:'ทบทวนภาษาไทย', desc:'พยัญชนะ · สระ · อ่านคำ · ครูวรรณภา', emoji:'🇹🇭', color:'linear-gradient(135deg,#FF8E7A,#FF7A6B)', href:'exam.html?subj=thai', tag:'ทบทวน' },
  { group:'ภาษาไทย', title:'สระไทย', desc:'เติมสระ · บอกสระ · ดูภาพเติมสระ', emoji:'📝', color:'linear-gradient(135deg,#5BD9B2,#41C9A0)', href:'thai-vowels.html', tag:'เกมฝึก' },
  // ---------- ภาษาจีน ----------
  { group:'ภาษาจีน', title:'ทบทวนภาษาจีน', desc:'ตัวเลข · คำทักทาย · สี · ครูชัญญานุช', emoji:'🇨🇳', color:'linear-gradient(135deg,#FF7A6B,#E8453C)', href:'exam.html?subj=chinese', tag:'ทบทวน' },
  { group:'ภาษาจีน', title:'ภาษาจีน · ตัวเลข', desc:'นับเลขจีน 0–100 · 汉字 + พินอิน · มีเสียงพูด', emoji:'🔢', color:'linear-gradient(135deg,#FF8E7A,#E8453C)', href:'chinese-numbers.html', tag:'เกมฝึก' },
  // ---------- อังกฤษ (EP) ----------
  { group:'อังกฤษ (EP)', title:'Grammar', desc:'Nouns · Articles · Plurals · Pronouns · Teacher JJ', emoji:'📖', color:'linear-gradient(135deg,#A988E0,#9B6DD6)', href:'exam.html?subj=grammar', tag:'ทบทวน' },
  { group:'อังกฤษ (EP)', title:'Reading', desc:"อ่านจับใจความ · Ben's Picture · Pencil Case · Pets", emoji:'📕', color:'linear-gradient(135deg,#5C9DF5,#3B7DE0)', href:'exam.html?subj=reading', tag:'ทบทวน' },
  { group:'อังกฤษ (EP)', title:'Writing', desc:'Me · Family · Home · Teacher Tina', emoji:'✍️', color:'linear-gradient(135deg,#FFA94D,#F97B3D)', href:'exam.html?subj=writing', tag:'ทบทวน' },
  { group:'อังกฤษ (EP)', title:'Speech', desc:'การพูด/ออกเสียง', emoji:'🗣️', ready:false },
  // ---------- สังคมศึกษา ----------
  { group:'สังคมศึกษา', title:'สังคมฯ', desc:'ครอบครัว · ชุมชน · หน้าที่พลเมือง · ครูฐายิกา', emoji:'🌏', color:'linear-gradient(135deg,#FFB23F,#FF9F1C)', href:'exam.html?subj=social', tag:'ทบทวน' },
  { group:'สังคมศึกษา', title:'ประวัติศาสตร์', desc:'วันเวลา · อดีต-ปัจจุบัน · ครูฐายิกา', emoji:'📜', color:'linear-gradient(135deg,#C98B5E,#A9714A)', href:'exam.html?subj=history', tag:'ทบทวน' },
  // ---------- ฝึกเสริม (อังกฤษ) ----------
  { group:'ฝึกเสริม', title:'Vocabulary', desc:'คลังคำศัพท์ · ฟัง/แปล/จับคู่', emoji:'📚', color:'linear-gradient(135deg,#FF8E7A,#FF7A6B)', href:'vocabulary.html', tag:'เกมฝึก' },
  { group:'ฝึกเสริม', title:'ABC Phonics', desc:'เสียงตัวอักษร A–Z · เสียงต้นคำ · ฝึกอ่าน', emoji:'🔤', color:'linear-gradient(135deg,#A988E0,#9B6DD6)', href:'phonics.html', tag:'เกมฝึก' },
  { group:'ฝึกเสริม', title:'Body & Senses', desc:'ร่างกาย & ประสาทสัมผัส — ฟัง/เลือกคำ/จับคู่', emoji:'🧒', color:'linear-gradient(135deg,#FF8E7A,#FF7A6B)', href:'body-senses.html', tag:'เกมฝึก' },
  { group:'ฝึกเสริม', title:'Numbers · Unit 2', desc:'นับจำนวน · have/has · คำศัพท์เครื่องเขียน', emoji:'🔢', color:'linear-gradient(135deg,#5BC8F0,#3FA9F5)', href:'numbers.html', tag:'เกมฝึก' },
];

/* วิชาที่ยังไม่มีหนังสือยืนยัน — พักไว้ (ติดป้าย "รอเนื้อหาจากครู")
   เปิดใช้เมื่อครูส่งหนังสือ: ลบชื่อออกจากลิสต์นี้ + ปลดล็อกใน exam.html */
const WAIT_CONTENT = new Set(['คณิต','จินตคณิต','วิทย์','SCI','ทบทวนภาษาไทย','ทบทวนภาษาจีน','สังคมฯ','ประวัติศาสตร์']);
GAMES.forEach(g => { if(WAIT_CONTENT.has(g.title)) g.ready = false; });

function cardHTML(g){
  const inner = `
    <span class="ic">${g.emoji}</span>
    <span>
      <span class="t">${g.title}</span>
      <br><span class="d">${g.desc}</span>
      <br><span class="tag">${g.ready===false ? 'รอเนื้อหาจากครู' : (g.tag||'')}</span>
    </span>`;
  if(g.ready===false){ return `<div class="gcard soon">${inner}</div>`; }
  return `<a class="gcard" style="background:${g.color}" href="${g.href}">${inner}</a>`;
}
function render(){
  const grid = document.getElementById('grid');
  const byGroup = {};
  GAMES.forEach(g => { (byGroup[g.group] = byGroup[g.group] || []).push(g); });
  grid.innerHTML = GROUPS.filter(gr => byGroup[gr.name]).map(gr => {
    const head = `<div class="subj"><span class="sj-ic">${gr.icon}</span><span>${gr.name}</span><span class="sj-line"></span></div>`;
    return head + byGroup[gr.name].map(cardHTML).join('');
  }).join('');
}
render();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
</body>
</html>
