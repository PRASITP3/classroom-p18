<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ภาษาจีน · ตัวเลข — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+SC:wght@500;700;900&family=Nunito:wght@600;700;800&family=Sarabun:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red-1:#FF8A80; --red-2:#FFD6CF;
    --ink:#4A2727; --ink-soft:#7D5A5A;
    --gold:#FFC93C; --coral:#FF6B5E; --mint:#41C9A0; --grape:#9B6DD6; --sky:#3FA9F5; --red:#E8453C;
    --good:#41C9A0; --bad:#FF6B6B;
    --shadow:0 8px 0 rgba(74,39,39,.12), 0 14px 30px rgba(74,39,39,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sarabun','Nunito',sans-serif; color:var(--ink);
    background:linear-gradient(160deg,var(--red-1),var(--red-2));
    min-height:100dvh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden;
  }
  .wrap{width:100%; max-width:560px; padding:14px 16px 30px; flex:1; display:flex; flex-direction:column;}

  .top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .brand{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.15rem; display:flex; align-items:center; gap:7px;}
  .brand .dot{width:14px;height:14px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(232,69,60,.22);}
  .stars{background:#fff; border-radius:999px; padding:6px 13px; font-weight:800; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; font-size:1rem;}
  .stars .s{filter:drop-shadow(0 2px 0 rgba(255,178,0,.4)); transition:transform .25s;}
  .stars.pop .s{transform:scale(1.5) rotate(18deg);}

  .screen{display:none; flex:1; flex-direction:column;}
  .screen.active{display:flex; animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

  .hero{background:#fff; border-radius:26px; padding:22px 20px; box-shadow:var(--shadow); text-align:center; margin-bottom:16px;}
  .hero h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.7rem; margin:6px 0 2px;}
  .hero p{margin:0; color:var(--ink-soft); font-weight:700;}
  .hero .emoji{font-size:2.7rem; line-height:1;}
  .menu{display:flex; flex-direction:column; gap:14px;}
  .mcard{border:0; cursor:pointer; text-align:left; color:#fff; border-radius:22px; padding:18px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); font-family:'Fredoka',sans-serif; transition:transform .12s;}
  .mcard:active{transform:translateY(3px);}
  .mcard .ic{font-size:2.1rem; background:rgba(255,255,255,.25); width:58px; height:58px; border-radius:16px; display:grid; place-items:center; flex:none; font-family:'Noto Sans SC',sans-serif; font-weight:900;}
  .mcard .t{font-size:1.2rem; font-weight:700; line-height:1.1;}
  .mcard .d{font-family:'Sarabun',sans-serif; font-weight:700; opacity:.95; font-size:.9rem;}
  .c-learn{background:linear-gradient(135deg,#FFB23F,var(--gold));}
  .c-listen{background:linear-gradient(135deg,#A988E0,var(--grape));}
  .c-h2n{background:linear-gradient(135deg,#FF8E7A,var(--coral));}
  .c-n2h{background:linear-gradient(135deg,#5BC8F0,var(--sky));}
  .c-conn{background:linear-gradient(135deg,#5BD9B2,var(--mint));}

  .shead{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .back{border:0; background:#fff; box-shadow:var(--shadow); border-radius:14px; width:46px; height:46px; font-size:1.3rem; cursor:pointer; flex:none; color:var(--ink); font-weight:800; text-decoration:none; display:grid; place-items:center;}
  .back:active{transform:translateY(2px);}
  .stitle{font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.2rem;}
  .progress{margin-left:auto; font-weight:800; color:var(--ink-soft); background:#fff; padding:6px 12px; border-radius:999px; box-shadow:var(--shadow);}

  .panel{background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:18px 16px; flex:1; display:flex; flex-direction:column;}
  .instr{font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.15rem; text-align:center; margin:2px 0 12px;}

  .stage{display:grid; place-items:center; flex:1; gap:4px;}
  .hz{font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:4.6rem; line-height:1; text-align:center; color:var(--ink);}
  .hz.small{font-size:3.2rem;}
  .py{font-family:'Nunito',sans-serif; font-weight:800; font-size:1.4rem; color:var(--coral);}
  .pth{color:var(--ink-soft); font-weight:700; font-size:1.05rem;}
  .numbig{font-family:'Fredoka',sans-serif; font-weight:700; font-size:5rem; line-height:1; color:var(--ink);}
  .bigspeak{border:0; background:linear-gradient(135deg,#A988E0,var(--grape)); color:#fff; width:120px; height:120px; border-radius:50%; font-size:3rem; box-shadow:var(--shadow); cursor:pointer; display:grid; place-items:center;}
  .bigspeak:active{transform:translateY(3px);}

  /* learn grid */
  .lgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; overflow-y:auto;}
  .ltile{border:3px solid #F3E7E7; background:#FFFBFA; border-radius:18px; padding:12px 8px; text-align:center; cursor:pointer; transition:transform .1s,border-color .15s;}
  .ltile:active{transform:scale(.96);}
  .ltile.spk{border-color:var(--gold); background:#FFF8E6;}
  .ltile .num{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1rem; color:var(--ink-soft);}
  .ltile .hzc{font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:2.2rem; line-height:1.1;}
  .ltile .pyc{font-family:'Nunito',sans-serif; font-weight:800; color:var(--coral); font-size:1rem;}
  .ltile .thc{color:var(--ink-soft); font-size:.9rem; font-weight:700;}
  .ltile .note{color:#B8740C; background:#FFF1C9; border-radius:8px; font-size:.72rem; font-weight:700; padding:2px 6px; margin-top:5px; display:inline-block;}
  .ltile .spkr{font-size:.78rem; color:var(--ink-soft); font-weight:800; margin-top:3px;}

  .choices{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px;}
  .choice{border:3px solid #F0E2E2; background:#fff; border-radius:18px; padding:16px 10px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.5rem; cursor:pointer; color:var(--ink); transition:transform .1s, border-color .15s, background .15s;}
  .choice.zh{font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:2rem;}
  .choice:active{transform:scale(.97);}
  .choice.correct{border-color:var(--good); background:#E7FBF3; color:#1E8E6E;}
  .choice.wrong{border-color:var(--bad); background:#FFECEC; color:#D64545; animation:shake .4s;}
  .choice:disabled{cursor:default;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

  .feedback{text-align:center; font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.1rem; min-height:28px; margin-top:12px; color:var(--ink-soft);}
  .feedback.good{color:var(--good);} .feedback.bad{color:var(--bad);}

  .nextbtn{margin-top:auto; border:0; background:linear-gradient(135deg,#5BD9B2,var(--mint)); color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.2rem; padding:15px; border-radius:18px; box-shadow:var(--shadow); cursor:pointer; opacity:0; pointer-events:none; transition:opacity .2s;}
  .nextbtn.show{opacity:1; pointer-events:auto;}
  .nextbtn:active{transform:translateY(3px);}

  .connect{display:flex; flex-direction:column; gap:10px;}
  .crow{display:flex; align-items:center; gap:12px;}
  .ccue{flex:none; width:120px; border:3px solid #F3E7E7; border-radius:14px; padding:10px 8px; text-align:center; background:#FFFBFA;}
  .ccue .h{font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:1.9rem; line-height:1;}
  .ccue .p{font-family:'Nunito',sans-serif; font-weight:800; color:var(--coral); font-size:.82rem;}
  .copts{display:flex; flex-wrap:wrap; gap:8px; flex:1;}
  .copt{border:3px solid #F0E2E2; background:#fff; border-radius:13px; padding:9px 15px; font-family:'Fredoka',sans-serif; font-weight:700; cursor:pointer; font-size:1.2rem; color:var(--ink);}
  .copt.picked{opacity:.4;}
  .crow.done .ccue{border-color:var(--good); background:#E7FBF3;}

  .result{background:#fff; border-radius:26px; box-shadow:var(--shadow); padding:30px 22px; text-align:center; flex:1; display:flex; flex-direction:column; justify-content:center;}
  .result .big{font-size:3.4rem;}
  .result h2{font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.8rem; margin:8px 0 2px;}
  .result .score{font-weight:800; color:var(--ink-soft); font-size:1.2rem;}
  .result .rstars{font-size:2rem; margin:14px 0; letter-spacing:6px;}
  .result button{margin-top:10px; border:0; border-radius:18px; padding:15px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.15rem; cursor:pointer; box-shadow:var(--shadow); color:#fff;}
  .r-again{background:linear-gradient(135deg,#FFB23F,var(--gold));}
  .result button.r-home{background:#fff; color:var(--ink); margin-top:12px; border:3px solid #F3E7E7; box-shadow:none;}

  .speak-fab{position:fixed; bottom:18px; right:18px; width:60px; height:60px; border-radius:50%; border:0; background:var(--grape); color:#fff; font-size:1.6rem; box-shadow:var(--shadow); cursor:pointer; z-index:30; display:none;}
  .speak-fab.show{display:grid; place-items:center;}
  .speak-fab:active{transform:translateY(3px);}

  .confetti{position:fixed; top:-10px; width:11px; height:18px; z-index:50; pointer-events:none; border-radius:2px;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:0;}}
  /* ปุ่มกลับด้านบน (โชว์เฉพาะหน้าเมนูเกม) */
  .topback{display:none; flex:none; text-decoration:none; background:#fff; border-radius:12px; width:42px; height:42px; align-items:center; justify-content:center; font-size:1.4rem; font-weight:800; color:var(--ink); box-shadow:var(--shadow);}
  .topback:active{transform:translateY(2px);}
  .top .brand{margin-right:auto;}
  .wrap:has(#home.active) .topback{display:grid;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="topback" href="index.html" title="กลับไปติวเด็ก">‹</a>
    <div class="brand"><span class="dot"></span> 中文 · ตัวเลข</div>
    <div class="stars" id="starbox"><span class="s">⭐</span><span id="starnum">0</span></div>
  </div>

  <!-- HOME -->
  <section class="screen active" id="home">
    <div class="hero">
      <div class="emoji">🇨🇳🔢</div>
      <h1>ภาษาจีน · ตัวเลข</h1>
      <p id="wordcount">นับเลขจีน มีเสียงพูด</p>
    </div>
    <div class="menu">
      <button class="mcard c-learn" onclick="startLearn()">
        <span class="ic">学</span>
        <span><span class="t">ท่องเลข</span><br><span class="d">แตะการ์ดเพื่อฟังเสียงจีน 🔊</span></span>
      </button>
      <button class="mcard c-listen" onclick="startQuiz('listen')">
        <span class="ic">听</span>
        <span><span class="t">ฟังเสียง → เลือกเลข</span><br><span class="d">ฟังเสียงจีนแล้วเลือกตัวเลข</span></span>
      </button>
      <button class="mcard c-h2n" onclick="startQuiz('hz2num')">
        <span class="ic">汉</span>
        <span><span class="t">จีน → ตัวเลข</span><br><span class="d">เห็นตัวจีน เลือกตัวเลข</span></span>
      </button>
      <button class="mcard c-n2h" onclick="startQuiz('num2hz')">
        <span class="ic">数</span>
        <span><span class="t">ตัวเลข → จีน</span><br><span class="d">เห็นตัวเลข เลือกตัวจีน</span></span>
      </button>
      <button class="mcard c-conn" onclick="startConnect()">
        <span class="ic">配</span>
        <span><span class="t">จับคู่</span><br><span class="d">จับคู่ตัวจีนกับตัวเลข</span></span>
      </button>
    </div>
  </section>

  <!-- LEARN -->
  <section class="screen" id="learn">
    <div class="shead">
      <button class="back" onclick="goHome()">‹</button>
      <span class="stitle">ท่องเลข</span>
    </div>
    <div class="panel">
      <div class="instr">แตะการ์ดเพื่อฟังเสียง 🔊</div>
      <div class="lgrid" id="learnGrid"></div>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="quiz">
    <div class="shead">
      <button class="back" onclick="goHome()">‹</button>
      <span class="stitle" id="quizTitle">Quiz</span>
      <span class="progress" id="quizProg">1 / 10</span>
    </div>
    <div class="panel">
      <div id="quizBody"></div>
      <div class="feedback" id="quizFb"></div>
      <button class="nextbtn" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>
  </section>

  <!-- CONNECT -->
  <section class="screen" id="connect">
    <div class="shead">
      <button class="back" onclick="goHome()">‹</button>
      <span class="stitle">จับคู่</span>
      <span class="progress" id="connProg">0 / 5</span>
    </div>
    <div class="panel">
      <div class="instr">จับคู่ตัวจีนกับตัวเลข</div>
      <div class="connect" id="connectArea"></div>
      <div class="feedback" id="connFb"></div>
      <button class="nextbtn" id="connNext" onclick="goHome()">Done ✓</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="result">
    <div class="result">
      <div class="big" id="rEmoji">🎉</div>
      <h2 id="rTitle">Great job!</h2>
      <div class="score" id="rScore">10 / 10</div>
      <div class="rstars" id="rStars">⭐⭐⭐</div>
      <button class="r-again" id="rAgain">เล่นอีกครั้ง</button>
      <button class="r-home" onclick="goHome()">กลับเมนู</button>
    </div>
  </section>
</div>

<button class="speak-fab" id="repeatBtn" title="ฟังอีกครั้ง">🔊</button>

<script>
/* =====================================================================
   🔢 คลังตัวเลขจีน — เพิ่ม/แก้ได้ที่นี่ (1 บรรทัด = ใช้ได้ทุกโหมด)
   รูปแบบ: { val:'ตัวเลข', hz:'ตัวจีน', py:'พินอิน', th:'คำอ่านไทย', note:'หมายเหตุ (ถ้ามี)' }
   ===================================================================== */
const NUMS = [
  { val:'0',  hz:'零',   py:'líng',   th:'หลิง' },
  { val:'1',  hz:'一',   py:'yī',     th:'อี' },
  { val:'2',  hz:'二',   py:'èr',     th:'เอ้อร์', note:'两 (liǎng เหลี่ยง) ใช้เวลาบอกจำนวนของ' },
  { val:'3',  hz:'三',   py:'sān',    th:'ซาน' },
  { val:'4',  hz:'四',   py:'sì',     th:'ซื่อ' },
  { val:'5',  hz:'五',   py:'wǔ',     th:'อู่' },
  { val:'6',  hz:'六',   py:'liù',    th:'ลิ่ว' },
  { val:'7',  hz:'七',   py:'qī',     th:'ชี' },
  { val:'8',  hz:'八',   py:'bā',     th:'ปา' },
  { val:'9',  hz:'九',   py:'jiǔ',    th:'จิ่ว' },
  { val:'10', hz:'十',   py:'shí',    th:'สือ' },
  { val:'20', hz:'二十', py:'èrshí',  th:'เอ้อร์สือ' },
  { val:'30', hz:'三十', py:'sānshí', th:'ซานสือ' },
  { val:'40', hz:'四十', py:'sìshí',  th:'ซื่อสือ' },
  { val:'50', hz:'五十', py:'wǔshí',  th:'อู่สือ' },
  { val:'60', hz:'六十', py:'liùshí', th:'ลิ่วสือ' },
  { val:'70', hz:'七十', py:'qīshí',  th:'ชีสือ' },
  { val:'80', hz:'八十', py:'bāshí',  th:'ปาสือ' },
  { val:'90', hz:'九十', py:'jiǔshí', th:'จิ่วสือ' },
  { val:'100',hz:'一百', py:'yībǎi',  th:'อีป่าย' },
];

const QUIZ_LEN = 10;   // จำนวนข้อต่อรอบ (ปรับได้)
const MATCH_LEN = 5;   // จำนวนคู่ต่อรอบโหมดจับคู่

/* ---------- Speech (ภาษาจีนกลาง zh-CN) ---------- */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>/zh[-_]CN/i.test(v.lang) && /female|huihui|yaoyao|xiaoxiao|google/i.test(v.name))
       || vs.find(v=>/zh[-_]CN/i.test(v.lang))
       || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function say(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='zh-CN'; u.rate=.8; u.pitch=1.05; if(voice) u.voice=voice;
  speechSynthesis.speak(u);
}
let lastSpoken="";
document.getElementById('repeatBtn').onclick=()=>{ if(lastSpoken) say(lastSpoken); };

/* ---------- Helpers ---------- */
let stars = 0;
function addStar(){
  stars++; document.getElementById('starnum').textContent=stars;
  const sb=document.getElementById('starbox'); sb.classList.add('pop');
  setTimeout(()=>sb.classList.remove('pop'),260);
}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('repeatBtn').classList.toggle('show', id==='quiz');
}
function goHome(){ if(window.speechSynthesis) speechSynthesis.cancel(); show('home'); }
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}

document.getElementById('wordcount').textContent = `มี ${NUMS.length} จำนวน · 0–10 และ 20–100`;

/* ---------- LEARN ---------- */
function startLearn(){
  const g=document.getElementById('learnGrid'); g.innerHTML='';
  NUMS.forEach(w=>{
    const d=document.createElement('button'); d.className='ltile';
    d.innerHTML=`<div class="num">${w.val}</div>
      <div class="hzc">${w.hz}</div>
      <div class="pyc">${w.py}</div>
      <div class="thc">${w.th}</div>
      ${w.note?`<div class="note">${w.note}</div>`:''}
      <div class="spkr">🔊 แตะฟัง</div>`;
    d.onclick=()=>{ say(w.hz); g.querySelectorAll('.ltile').forEach(x=>x.classList.remove('spk')); d.classList.add('spk'); };
    g.appendChild(d);
  });
  show('learn');
}

/* ---------- QUIZ (listen / hz2num / num2hz) ---------- */
let quiz={mode:null,list:[],idx:0,score:0};
function startQuiz(mode){
  quiz.mode=mode; quiz.idx=0; quiz.score=0;
  quiz.list = shuffle(NUMS.slice()).slice(0, Math.min(QUIZ_LEN, NUMS.length));
  const titles={listen:'ฟังเสียง → เลือกเลข', hz2num:'จีน → ตัวเลข', num2hz:'ตัวเลข → จีน'};
  document.getElementById('quizTitle').textContent = titles[mode];
  show('quiz'); renderQuestion();
}
function renderQuestion(){
  const total=quiz.list.length;
  document.getElementById('quizProg').textContent=`${quiz.idx+1} / ${total}`;
  document.getElementById('quizFb').textContent='';
  document.getElementById('quizFb').className='feedback';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('nextBtn').textContent = quiz.idx===total-1 ? 'Finish ✓' : 'Next →';
  const q=quiz.list[quiz.idx];
  const body=document.getElementById('quizBody');
  lastSpoken=q.hz;

  if(quiz.mode==='listen'){
    body.innerHTML=`<div class="instr">ฟังเสียงแล้วเลือกตัวเลข</div>
      <div class="stage"><button class="bigspeak" id="bigSpk">🔊</button></div>
      <div class="choices" id="choiceBox"></div>`;
    document.getElementById('bigSpk').onclick=()=>say(q.hz);
    const wrong = shuffle(NUMS.filter(w=>w.val!==q.val)).slice(0,3).map(w=>w.val);
    renderChoices(shuffle([q.val,...wrong]), q.val, q.hz, false);
    say(q.hz);
  } else if(quiz.mode==='hz2num'){
    body.innerHTML=`<div class="instr">ตัวจีนนี้คือเลขอะไร? 🔊</div>
      <div class="stage"><div class="hz">${q.hz}</div><div class="py">${q.py}</div></div>
      <div class="choices" id="choiceBox"></div>`;
    const wrong = shuffle(NUMS.filter(w=>w.val!==q.val)).slice(0,3).map(w=>w.val);
    renderChoices(shuffle([q.val,...wrong]), q.val, q.hz, false);
    say(q.hz);
  } else { // num2hz
    body.innerHTML=`<div class="instr">เลขนี้เขียนเป็นตัวจีนแบบไหน?</div>
      <div class="stage"><div class="numbig">${q.val}</div></div>
      <div class="choices" id="choiceBox"></div>`;
    const wrong = shuffle(NUMS.filter(w=>w.hz!==q.hz)).slice(0,3).map(w=>w.hz);
    renderChoices(shuffle([q.hz,...wrong]), q.hz, q.hz, true);
  }
}
function renderChoices(opts, correct, speakWord, zh){
  const box=document.getElementById('choiceBox'); box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='choice'+(zh?' zh':''); b.textContent=o;
    b.onclick=()=>pickAnswer(b,o,correct,speakWord);
    box.appendChild(b);
  });
}
function pickAnswer(btn, chosen, correct, speakWord){
  const box=document.getElementById('choiceBox');
  box.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('quizFb');
  if(chosen===correct){
    btn.classList.add('correct'); quiz.score++; addStar();
    fb.textContent='เก่งมาก! 很好! 🌟'; fb.className='feedback good';
    say(speakWord); miniConfetti();
  } else {
    btn.classList.add('wrong');
    box.querySelectorAll('.choice').forEach(b=>{ if(b.textContent===correct) b.classList.add('correct'); });
    fb.textContent='คำตอบคือ "'+correct+'"'; fb.className='feedback bad';
    say(speakWord);
  }
  document.getElementById('nextBtn').classList.add('show');
}
function nextQuestion(){
  if(quiz.idx < quiz.list.length-1){ quiz.idx++; renderQuestion(); }
  else { if(window.P18Auth) P18Auth.saveScore('chinese-numbers', quiz.mode, quiz.score, quiz.list.length); showResult(quiz.score, quiz.list.length, ()=>startQuiz(quiz.mode)); }
}

/* ---------- CONNECT (hz -> number) ---------- */
let conn={done:0};
function startConnect(){
  conn.done=0;
  document.getElementById('connFb').textContent='';
  document.getElementById('connNext').classList.remove('show');
  const picks = shuffle(NUMS.slice()).slice(0, Math.min(MATCH_LEN, NUMS.length));
  document.getElementById('connProg').textContent='0 / '+picks.length;
  const area=document.getElementById('connectArea'); area.innerHTML='';
  picks.forEach(w=>{
    const row=document.createElement('div'); row.className='crow'; row.dataset.ans=w.val; row.dataset.hz=w.hz;
    const cue=document.createElement('div'); cue.className='ccue'; cue.innerHTML=`<div class="h">${w.hz}</div><div class="p">${w.py}</div>`;
    cue.onclick=()=>say(w.hz);
    const optsWrap=document.createElement('div'); optsWrap.className='copts';
    row.appendChild(cue); row.appendChild(optsWrap); area.appendChild(row);
  });
  const valChoices = shuffle(picks.map(w=>w.val));
  area.querySelectorAll('.crow').forEach(row=>{
    const wrap=row.querySelector('.copts');
    valChoices.forEach(val=>{
      const o=document.createElement('button'); o.className='copt'; o.textContent=val;
      o.onclick=()=>connPick(row,o,val,picks.length);
      wrap.appendChild(o);
    });
  });
  show('connect');
}
function connPick(row,btn,val,total){
  if(row.classList.contains('done')) return;
  const fb=document.getElementById('connFb');
  if(val===row.dataset.ans){
    row.classList.add('done'); conn.done++; addStar();
    row.querySelectorAll('.copt').forEach(c=>c.disabled=true);
    say(row.dataset.hz);
    fb.textContent='จับคู่ถูก! 对了! 🌟'; fb.className='feedback good';
    document.getElementById('connProg').textContent=conn.done+' / '+total;
    miniConfetti();
    if(conn.done===total){ if(window.P18Auth) P18Auth.saveScore('chinese-numbers','match',total,total); setTimeout(()=>showResult(total,total, startConnect),600); }
  } else {
    btn.classList.add('picked'); btn.disabled=true;
    fb.textContent='ลองใหม่อีกครั้ง!'; fb.className='feedback bad';
  }
}

/* ---------- RESULT ---------- */
function showResult(score,total,againFn){
  show('result');
  const pct=score/total;
  document.getElementById('rScore').textContent=score+' / '+total;
  document.getElementById('rEmoji').textContent = pct===1?'🏆':pct>=.7?'🎉':'💪';
  document.getElementById('rTitle').textContent = pct===1?'เยี่ยมมาก! 太棒了!':pct>=.7?'เก่งมาก! 很好!':'สู้ต่อไป!';
  document.getElementById('rStars').textContent = pct===1?'⭐⭐⭐':pct>=.7?'⭐⭐':'⭐';
  document.getElementById('rAgain').onclick=againFn;
  if(pct>=.7) bigConfetti();
  say(pct>=.7?'很好':'加油');
}

/* ---------- Confetti ---------- */
const COLORS=['#FFD23F','#FF7A6B','#41C9A0','#9B6DD6','#3FA9F5'];
function miniConfetti(){ burst(14); }
function bigConfetti(){ burst(60); }
function burst(n){
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=COLORS[i%COLORS.length];
    c.style.animation=`fall ${1+Math.random()*1.2}s ${Math.random()*.3}s linear forwards`;
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2600);
  }
}
document.body.addEventListener('click',function once(){ try{ say(' '); }catch(e){}; document.body.removeEventListener('click',once); }, {once:true});
